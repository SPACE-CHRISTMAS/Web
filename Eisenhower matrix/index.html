<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матрица Эйзенхауэра</title>
    <style>
        /* Общие настройки и темная тема */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            width: 100%;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* Сетка Матрицы */
        .matrix-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            max-width: 800px;
            height: 500px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .quadrant {
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Цвета квадратов */
        .q-do { background-color: #1e2732; }       
        .q-plan { background-color: #253124; }     
        .q-delegate { background-color: #332d1f; } 
        .q-eliminate { background-color: #312122; }

        .q-header {
            margin-bottom: 15px;
        }

        .q-header strong {
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .q-header small {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        /* Списки задач */
        ul.task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .task-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            word-break: break-word;
            transition: background 0.2s;
        }

        .task-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Блок с кнопками действий (Вверх, Вниз, Удалить) */
        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0; /* Скрыто по умолчанию */
            transition: opacity 0.2s;
            margin-left: 10px;
        }

        .task-item:hover .task-actions {
            opacity: 1; /* Показываем при наведении */
        }

        .action-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 14px;
        }

        .action-btn {
            color: #888;
            font-size: 14px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #fff;
        }

        .delete-btn {
            color: #ff6b6b;
            font-size: 18px;
            margin-left: 4px;
        }

        .delete-btn:hover {
            color: #ff4c4c;
        }

        /* Панель управления */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 40px;
            width: 100%;
            max-width: 800px;
            align-items: center;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .control-item label {
            margin-right: 15px;
        }

        input[type="text"] {
            flex-grow: 1;
            background-color: #1e1e1e;
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            max-width: 250px;
        }

        /* Стилизация тумблеров */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent;
            border: 1px solid #666;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: #ccc;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { border-color: #aaa; }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #fff;
        }

        /* Кнопка "Добавить" */
        .add-btn {
            width: 100%;
            background-color: #2d2d2d;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: #3d3d3d;
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <h1>Матрица Эйзенхауэра</h1>

    <div class="matrix-container">
        <!-- Квадраты -->
        <div class="quadrant q-do">
            <div class="q-header">
                <strong>СДЕЛАТЬ</strong>
                <small>Срочно и Важно</small>
            </div>
            <ul class="task-list" id="list-do"></ul>
        </div>
        <div class="quadrant q-plan">
            <div class="q-header">
                <strong>ЗАПЛАНИРОВАТЬ</strong>
                <small>Не срочно и Важно</small>
            </div>
            <ul class="task-list" id="list-plan"></ul>
        </div>
        <div class="quadrant q-delegate">
            <div class="q-header">
                <strong>ДЕЛЕГИРОВАТЬ</strong>
                <small>Срочно и Не важно</small>
            </div>
            <ul class="task-list" id="list-delegate"></ul>
        </div>
        <div class="quadrant q-eliminate">
            <div class="q-header">
                <strong>УДАЛИТЬ</strong>
                <small>Не срочно и Не важно</small>
            </div>
            <ul class="task-list" id="list-eliminate"></ul>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="controls">
        <div class="control-item">
            <label for="taskInput">Название задачи</label>
            <input type="text" id="taskInput" onkeypress="handleKeyPress(event)">
        </div>
        <div class="control-item">
            <label>Срочно</label>
            <label class="switch">
                <input type="checkbox" id="urgentToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="control-item">
            <label>Важно</label>
            <label class="switch">
                <input type="checkbox" id="importantToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="control-item" style="justify-content: flex-end;">
            <button class="add-btn" onclick="addTask()">Добавить</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('matrixTasks')) || [];

        function saveAndRender() {
            localStorage.setItem('matrixTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            document.getElementById('list-do').innerHTML = '';
            document.getElementById('list-plan').innerHTML = '';
            document.getElementById('list-delegate').innerHTML = '';
            document.getElementById('list-eliminate').innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                
                // Добавлены кнопки "Вверх" (▲) и "Вниз" (▼)
                li.innerHTML = `
                    <span>${task.text}</span>
                    <div class="task-actions">
                        <button class="action-btn" onclick="moveTask(${task.id}, -1)" title="Поднять">▲</button>
                        <button class="action-btn" onclick="moveTask(${task.id}, 1)" title="Опустить">▼</button>
                        <button class="delete-btn" onclick="deleteTask(${task.id})" title="Удалить">&times;</button>
                    </div>
                `;

                if (task.urgent && task.important) {
                    document.getElementById('list-do').appendChild(li);
                } else if (!task.urgent && task.important) {
                    document.getElementById('list-plan').appendChild(li);
                } else if (task.urgent && !task.important) {
                    document.getElementById('list-delegate').appendChild(li);
                } else {
                    document.getElementById('list-eliminate').appendChild(li);
                }
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text === '') return;

            const isUrgent = document.getElementById('urgentToggle').checked;
            const isImportant = document.getElementById('importantToggle').checked;

            const newTask = {
                id: Date.now(),
                text: text,
                urgent: isUrgent,
                important: isImportant
            };

            tasks.push(newTask);
            input.value = '';
            
            document.getElementById('urgentToggle').checked = false;
            document.getElementById('importantToggle').checked = false;

            saveAndRender();
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(task => task.id !== taskId);
            saveAndRender();
        }

        // Новая функция: Перемещение задачи вверх или вниз
        function moveTask(taskId, direction) {
            // Находим индекс текущей задачи в общем массиве
            const index = tasks.findIndex(t => t.id === taskId);
            if (index === -1) return;

            const currentTask = tasks[index];
            let targetIndex = -1;
            
            // Ищем ближайшую задачу в ТОЙ ЖЕ категории (чтобы поменяться с ней местами)
            if (direction === -1) { 
                // Ищем вверх (предыдущую задачу)
                for (let i = index - 1; i >= 0; i--) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i;
                        break;
                    }
                }
            } else { 
                // Ищем вниз (следующую задачу)
                for (let i = index + 1; i < tasks.length; i++) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i;
                        break;
                    }
                }
            }

            // Если сосед найден, меняем их местами
            if (targetIndex !== -1) {
                const temp = tasks[index];
                tasks[index] = tasks[targetIndex];
                tasks[targetIndex] = temp;
                saveAndRender(); // Сохраняем и перерисовываем
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTask();
            }
        }

        renderTasks();
    </script>
</body>
</html>
