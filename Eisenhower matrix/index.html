<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матриця Ейзенхауера</title>
    <style>
        * { box-sizing: border-box; } 
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { width: 100%; max-width: 800px; font-weight: 500; margin-bottom: 20px; text-align: center; }
        
        .matrix-container { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; width: 100%; max-width: 1700px; height: 600px; border-radius: 8px; overflow: hidden; margin-bottom: 30px; gap: 10px; }
        .quadrant { padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .q-do { background-color: #1e2732; }       
        .q-plan { background-color: #253124; }     
        .q-delegate { background-color: #332d1f; } 
        .q-eliminate { background-color: #312122; }
        .q-header { margin-bottom: 15px; }
        
        .task-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .task-item { background-color: rgba(255, 255, 255, 0.05); padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; font-size: 14px; }
        
        /* ЛОГІКА КНОПОК */
        .task-actions { display: flex; gap: 8px; margin-top: 15px; margin-left: -10px; transition: opacity 0.2s; }
        
        @media (min-width: 651px) {
            .task-actions { flex-direction: row; opacity: 0; }
            .task-item:hover .task-actions { opacity: 1; }
        }
        @media (max-width: 650px) {
            .task-actions { flex-direction: column; opacity: 1; align-items: flex-start; }
        }

        .action-btn, .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 20px; color: #888; }
        .delete-btn { color: #ff6b6b; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .editor-container { width: 100%; background-color: #1e1e1e; border-radius: 8px; display: flex; flex-direction: column; }
        .editor-toolbar { background-color: #2d2d2d; padding: 6px 10px; display: flex; gap: 5px; border-bottom: 1px solid #333; }
        .toolbar-btn { background: none; border: none; color: #aaa; cursor: pointer; padding: 4px 8px; font-weight: bold; }
        #taskInput { min-height: 80px; padding: 12px; outline: none; }
        
        .add-btn { width: 100%; background-color: #2d2d2d; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        @media (max-width: 650px) {
            .matrix-container { grid-template-columns: 1fr; height: auto; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Матриця Ейзенхауера</h1>
    <div class="matrix-container">
        <div class="quadrant q-do"><div class="q-header"><strong>ЗРОБИТИ</strong></div><ul class="task-list" id="list-do"></ul></div>
        <div class="quadrant q-plan"><div class="q-header"><strong>ЗАПЛАНУВАТИ</strong></div><ul class="task-list" id="list-plan"></ul></div>
        <div class="quadrant q-delegate"><div class="q-header"><strong>ДЕЛЕГУВАТИ</strong></div><ul class="task-list" id="list-delegate"></ul></div>
        <div class="quadrant q-eliminate"><div class="q-header"><strong>ВИДАЛИТИ</strong></div><ul class="task-list" id="list-eliminate"></ul></div>
    </div>

    <div class="controls">
        <div class="editor-container">
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="formatText('bold')">B</button>
                <button class="toolbar-btn" onclick="formatText('italic')">I</button>
                <button class="toolbar-btn" onclick="formatText('strikeThrough')">S</button>
                <button class="toolbar-btn" onclick="formatText('insertOrderedList')">1.</button>
                <button class="toolbar-btn" onclick="formatText('insertUnorderedList')">•</button>
            </div>
            <div id="taskInput" contenteditable="true"></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="checkbox" id="urgentToggle"> Терміново
            <input type="checkbox" id="importantToggle"> Важливо
            <button class="add-btn" onclick="addTask()">Додати завдання</button>
        </div>
    </div>

    <script>
        const BIN_ID = '6a4b8c20f5f4af5e29661c57'; 
        const API_KEY = '$2a$10$FfbvEpEcvDc0R8XqVBmJuuVffUlgDo.WmGuiKiS/dBvC3eA.8S.Xe';
        let tasks = [];

        function formatText(cmd) { document.execCommand(cmd, false, null); }

        async function loadTasksFromCloud() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const data = await res.json();
            tasks = data.record || [];
            renderTasks();
        }

        async function saveTasksToCloud() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(tasks)
            });
        }

        function renderTasks() {
            document.getElementById('list-do').innerHTML = '';
            document.getElementById('list-plan').innerHTML = '';
            document.getElementById('list-delegate').innerHTML = '';
            document.getElementById('list-eliminate').innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-content">${task.text}</div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="moveTask(${task.id}, -1)">▲</button>
                        <button class="action-btn" onclick="moveTask(${task.id}, 1)">▼</button>
                        <button class="action-btn edit-btn" onclick="editTask(${task.id})">✎</button>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
                    </div>
                `;
                if (task.urgent && task.important) document.getElementById('list-do').appendChild(li);
                else if (!task.urgent && task.important) document.getElementById('list-plan').appendChild(li);
                else if (task.urgent && !task.important) document.getElementById('list-delegate').appendChild(li);
                else document.getElementById('list-eliminate').appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.innerText.trim()) return;
            tasks.push({
                id: Date.now(),
                text: input.innerHTML,
                urgent: document.getElementById('urgentToggle').checked,
                important: document.getElementById('importantToggle').checked
            });
            input.innerHTML = '';
            renderTasks();
            saveTasksToCloud();
        }

        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); renderTasks(); saveTasksToCloud(); }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            document.getElementById('taskInput').innerHTML = task.text;
            document.getElementById('urgentToggle').checked = task.urgent;
            document.getElementById('importantToggle').checked = task.important;
            deleteTask(id);
        }

        function moveTask(id, dir) { /* логіка сортування залишається */ renderTasks(); saveTasksToCloud(); }

        loadTasksFromCloud();
    </script>
</body>
</html>
