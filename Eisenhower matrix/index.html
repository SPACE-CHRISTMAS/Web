<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матриця Ейзенхауера</title>
    <style>
        /* Загальні налаштування та темна тема */
        * { box-sizing: border-box; } 

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            width: 100%;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Сітка Матриці */
        .matrix-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            max-width: 800px;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .quadrant {
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Кольори квадратів */
        .q-do { background-color: #1e2732; }       
        .q-plan { background-color: #253124; }     
        .q-delegate { background-color: #332d1f; } 
        .q-eliminate { background-color: #312122; }

        .q-header { margin-bottom: 15px; }

        .q-header strong {
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .q-header small {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        /* Списки завдань */
        ul.task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .task-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            word-break: break-word;
            transition: background 0.2s;
        }

        .task-item:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* Блок із кнопками дій */
        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 1; 
            margin-left: 10px;
        }

        @media (min-width: 768px) {
            .task-actions { opacity: 0; transition: opacity 0.2s; }
            .task-item:hover .task-actions { opacity: 1; }
        }

        .action-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 14px;
        }

        .action-btn { color: #888; font-size: 14px; transition: color 0.2s; }
        .action-btn:hover { color: #fff; }
        .delete-btn { color: #ff6b6b; font-size: 18px; margin-left: 4px; }
        .delete-btn:hover { color: #ff4c4c; }

        /* Панель керування */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            align-items: center;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .control-item label { margin-right: 15px; }

        input[type="text"] {
            flex-grow: 1;
            background-color: #1e1e1e;
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        /* Стилізація перемикачів */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent;
            border: 1px solid #666;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: #ccc;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { border-color: #aaa; }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #fff;
        }

        .add-btn {
            width: 100%;
            background-color: #2d2d2d;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover { background-color: #3d3d3d; }
        
        .loading {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            height: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* ========================================= */
        /* АДАПТИВНІСТЬ ДЛЯ ТЕЛЕФОНІВ */
        /* ========================================= */
        @media (max-width: 650px) {
            .matrix-container {
                grid-template-columns: 1fr; 
                grid-template-rows: auto;   
                height: auto;
            }
            .quadrant {
                min-height: 200px; 
            }
            .controls {
                grid-template-columns: 1fr; 
                gap: 15px;
            }
            .control-item.full-width-mobile {
                flex-direction: column;
                align-items: flex-start;
            }
            .control-item.full-width-mobile input {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <h1>Матриця Ейзенхауера</h1>
    <div id="loadingStatus" class="loading">Завантаження даних з хмари...</div>

    <div class="matrix-container">
        <div class="quadrant q-do">
            <div class="q-header">
                <strong>ЗРОБИТИ</strong><small>Терміново і Важливо</small>
            </div>
            <ul class="task-list" id="list-do"></ul>
        </div>
        <div class="quadrant q-plan">
            <div class="q-header">
                <strong>ЗАПЛАНУВАТИ</strong><small>Не терміново і Важливо</small>
            </div>
            <ul class="task-list" id="list-plan"></ul>
        </div>
        <div class="quadrant q-delegate">
            <div class="q-header">
                <strong>ДЕЛЕГУВАТИ</strong><small>Терміново і Не важливо</small>
            </div>
            <ul class="task-list" id="list-delegate"></ul>
        </div>
        <div class="quadrant q-eliminate">
            <div class="q-header">
                <strong>ВИДАЛИТИ</strong><small>Не терміново і Не важливо</small>
            </div>
            <ul class="task-list" id="list-eliminate"></ul>
        </div>
    </div>

    <div class="controls">
        <div class="control-item full-width-mobile">
            <label for="taskInput">Назва завдання</label>
            <input type="text" id="taskInput" onkeypress="handleKeyPress(event)">
        </div>
        <div class="control-item">
            <label>Терміново</label>
            <label class="switch">
                <input type="checkbox" id="urgentToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="control-item">
            <label>Важливо</label>
            <label class="switch">
                <input type="checkbox" id="importantToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="control-item">
            <button class="add-btn" onclick="addTask()">Додати завдання</button>
        </div>
    </div>

    <script>
        // === ВАШІ ДАНІ ===
        const BIN_ID = '6a4b8c20f5f4af5e29661c57'; 
        const API_KEY = '$2a$10$FfbvEpEcvDc0R8XqVBmJuuVffUlgDo.WmGuiKiS/dBvC3eA.8S.Xe';
        // ==================================

        let tasks = [];
        const loadingStatus = document.getElementById('loadingStatus');

        async function loadTasksFromCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (!response.ok) throw new Error('Помилка мережі');
                const data = await response.json();
                tasks = data.record || [];
                loadingStatus.innerText = ''; 
                renderTasks();
            } catch (error) {
                loadingStatus.innerText = 'Помилка завантаження даних. Перевірте API_KEY.';
                console.error(error);
            }
        }

        async function saveTasksToCloud() {
            loadingStatus.innerText = 'Збереження в хмару...';
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(tasks)
                });
                loadingStatus.innerText = 'Збережено!';
                setTimeout(() => loadingStatus.innerText = '', 2000); 
            } catch (error) {
                loadingStatus.innerText = 'Помилка збереження :(';
                console.error(error);
            }
        }

        function saveAndRender() {
            renderTasks(); 
            saveTasksToCloud(); 
        }

        function renderTasks() {
            document.getElementById('list-do').innerHTML = '';
            document.getElementById('list-plan').innerHTML = '';
            document.getElementById('list-delegate').innerHTML = '';
            document.getElementById('list-eliminate').innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                
                li.innerHTML = `
                    <span>${task.text}</span>
                    <div class="task-actions">
                        <button class="action-btn" onclick="moveTask(${task.id}, -1)" title="Підняти">▲</button>
                        <button class="action-btn" onclick="moveTask(${task.id}, 1)" title="Опустити">▼</button>
                        <button class="delete-btn" onclick="deleteTask(${task.id})" title="Видалити">&times;</button>
                    </div>
                `;

                if (task.urgent && task.important) {
                    document.getElementById('list-do').appendChild(li);
                } else if (!task.urgent && task.important) {
                    document.getElementById('list-plan').appendChild(li);
                } else if (task.urgent && !task.important) {
                    document.getElementById('list-delegate').appendChild(li);
                } else {
                    document.getElementById('list-eliminate').appendChild(li);
                }
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (text === '') return;

            const newTask = {
                id: Date.now(),
                text: text,
                urgent: document.getElementById('urgentToggle').checked,
                important: document.getElementById('importantToggle').checked
            };

            tasks.push(newTask);
            input.value = '';
            document.getElementById('urgentToggle').checked = false;
            document.getElementById('importantToggle').checked = false;

            saveAndRender();
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(task => task.id !== taskId);
            saveAndRender();
        }

        function moveTask(taskId, direction) {
            const index = tasks.findIndex(t => t.id === taskId);
            if (index === -1) return;

            const currentTask = tasks[index];
            let targetIndex = -1;
            
            if (direction === -1) { 
                for (let i = index - 1; i >= 0; i--) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i; break;
                    }
                }
            } else { 
                for (let i = index + 1; i < tasks.length; i++) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i; break;
                    }
                }
            }

            if (targetIndex !== -1) {
                const temp = tasks[index];
                tasks[index] = tasks[targetIndex];
                tasks[targetIndex] = temp;
                saveAndRender(); 
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') addTask();
        }

        loadTasksFromCloud();
    </script>
</body>
</html>
