<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матриця Ейзенхауера</title>
    <style>
        /* Загальні налаштування та темна тема */
        * { box-sizing: border-box; } 

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            width: 100%;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Сітка Матриці */
        .matrix-container {
            display: grid;
            /* Для ПК — 4 стовпчики в один рядок */
            grid-template-columns: 1fr 1fr 1fr 1fr; 
            width: 100%;
            max-width: 1700px; /* Збільшили ширину для зручності на ПК */
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            gap: 10px; /* Додамо трохи простору між квадратами */
        }

        .quadrant {
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Кольори квадратів */
        .q-do { background-color: #1e2732; }       
        .q-plan { background-color: #253124; }     
        .q-delegate { background-color: #332d1f; } 
        .q-eliminate { background-color: #312122; }

        .q-header { margin-bottom: 15px; }

        .q-header strong {
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .q-header small {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        /* Списки завдань */
        ul.task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .task-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            word-break: break-word;
            transition: background 0.2s;
        }

        .task-item:hover { background-color: rgba(255, 255, 255, 0.1); }
        
        /* Щоб форматування тексту (списки) всередині завдань виглядало гарно */
        .task-content { flex-grow: 1; }
        .task-content ul, .task-content ol { margin: 4px 0 4px 20px; padding: 0; }
        .task-content div { margin: 0; }

        /* ЛОГІКА КНОПОК */
        .task-actions { 
            display: flex; 
            gap: 8px; 
            margin-top: 15px; 
        }
        
        /* ПК: горизонтально */
        @media (min-width: 651px) {
            .task-actions { flex-direction: row; opacity: 0; }
            .task-item:hover .task-actions { opacity: 1; }
        }
        
        /* Телефон: вертикально */
        @media (max-width: 650px) {
            .task-actions { flex-direction: column; opacity: 1; align-items: flex-start; }
        }

        /* --- СТИЛІ ДЛЯ ПК (Кнопки при наведенні, горизонтально) --- */
        @media (min-width: 651px) {
            .task-actions {
                display: flex;
                flex-direction: row;
                gap: 8px;
                margin-top: 15px;
                margin-left: -10px;
                opacity: 0;
                transition: opacity 0.2s ease;
            }
            .task-item:hover .task-actions {
                opacity: 1;
            }
        }

        /* --- СТИЛІ ДЛЯ ТЕЛЕФОНУ (Кнопки завжди видимі, вертикально) --- */
        @media (max-width: 650px) {
            .task-actions {
                display: flex !important;
                flex-direction: row !important; /* Горизонтально для ПК */
                gap: 12px;
                margin-top: 10px;
                margin-left: 0;
                opacity: 1; /* Завжди видимі */
            }
        }

        .action-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 14px;
        }

        .action-btn { color: #888; font-size: 14px; transition: color 0.2s; }
        .action-btn:hover { color: #fff; }
        .delete-btn { color: #ff6b6b; font-size: 18px; margin-left: 4px; }
        .delete-btn:hover { color: #ff4c4c; }

        /* Панель керування та Редактор тексту */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            align-items: flex-start;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .control-item label { margin-right: 15px; }

        .editor-container {
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }
        .editor-container:focus-within { border-color: #555; }

        .editor-toolbar {
            background-color: #2d2d2d;
            padding: 6px 10px;
            display: flex;
            gap: 5px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid #333;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .toolbar-btn:hover { background-color: #444; color: #fff; }

        #taskInput {
            min-height: 80px;
            padding: 12px 16px;
            outline: none;
            overflow-y: auto;
            color: white;
            font-size: 14px;
        }
        #taskInput:empty:before {
            content: attr(placeholder);
            color: #888;
            pointer-events: none;
        }

        /* Стилізація перемикачів */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: transparent;
            border: 1px solid #666;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: #ccc;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { border-color: #aaa; }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #fff;
        }

        .add-btn {
            width: 100%;
            background-color: #2d2d2d;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .add-btn:hover { background-color: #3d3d3d; }
        
        .loading {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            height: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* АДАПТИВНІСТЬ ДЛЯ ТЕЛЕФОНІВ */
        @media (max-width: 650px) {
            .matrix-container {
                grid-template-columns: 1fr; 
                grid-template-rows: auto;   
                height: auto;
            }
            .quadrant { min-height: 200px; }
            .controls {
                grid-template-columns: 1fr; 
                gap: 15px;
            }
            .control-item.full-width-mobile {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .editor-container { margin-top: 5px; }
        }
        /* Фінальне розташування кнопок: горизонтально j*/ 
        .task-actions {
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: center;
            padding-left: 0;
        }

        /* Збільшуємо розмір кнопок для зручного натискання пальцем */
        .action-btn, .edit-btn, .delete-btn {
            padding: 8px !important; 
            font-size: 20px !important;
            line-height: 1 !important;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>Матриця Ейзенхауера</h1>
    <div id="loadingStatus" class="loading">Завантаження даних з хмари...</div>

    <div class="matrix-container">
        <div class="quadrant q-do">
            <div class="q-header">
                <strong>ЗРОБИТИ</strong><small>Терміново і Важливо</small>
            </div>
            <ul class="task-list" id="list-do"></ul>
        </div>
        <div class="quadrant q-plan">
            <div class="q-header">
                <strong>ЗАПЛАНУВАТИ</strong><small>Не терміново і Важливо</small>
            </div>
            <ul class="task-list" id="list-plan"></ul>
        </div>
        <div class="quadrant q-delegate">
            <div class="q-header">
                <strong>ДЕЛЕГУВАТИ</strong><small>Терміново і Не важливо</small>
            </div>
            <ul class="task-list" id="list-delegate"></ul>
        </div>
        <div class="quadrant q-eliminate">
            <div class="q-header">
                <strong>ВИДАЛИТИ</strong><small>Не терміново і Не важливо</small>
            </div>
            <ul class="task-list" id="list-eliminate"></ul>
        </div>
    </div>

    <div class="controls">
        <div class="control-item full-width-mobile">
            <!-- Редактор тексту замість звичайного input -->
            <div class="editor-container">
                <div class="editor-toolbar">
                    <button class="toolbar-btn" onclick="formatText('bold')" title="Жирний"><b>B</b></button>
                    <button class="toolbar-btn" onclick="formatText('italic')" title="Курсив"><i>I</i></button>
                    <button class="toolbar-btn" onclick="formatText('strikeThrough')" title="Закреслений"><del>S</del></button>
                    <div style="width: 1px; background: #444; margin: 0 5px;"></div>
                    <button class="toolbar-btn" onclick="formatText('insertOrderedList')" title="Нумерований список">1.</button>
                    <button class="toolbar-btn" onclick="formatText('insertUnorderedList')" title="Маркерований список">•</button>
                </div>
                <div id="taskInput" contenteditable="true" placeholder="" onkeydown="handleKeyPress(event)"></div>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
            <div class="control-item">
                <label>Терміново</label>
                <label class="switch">
                    <input type="checkbox" id="urgentToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="control-item">
                <label>Важливо</label>
                <label class="switch">
                    <input type="checkbox" id="importantToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="add-btn" onclick="addTask()">Додати завдання</button>
        </div>
    </div>

    <script>
        // === ВАШІ ДАНІ ===
        const BIN_ID = '6a4b8c20f5f4af5e29661c57'; 
        const API_KEY = '$2a$10$FfbvEpEcvDc0R8XqVBmJuuVffUlgDo.WmGuiKiS/dBvC3eA.8S.Xe'; // Починається на $2...
        // ==================================

        let tasks = [];
        const loadingStatus = document.getElementById('loadingStatus');

        // Функція для форматування тексту (жирний, курсив, списки тощо)
        function formatText(command) {
            document.execCommand(command, false, null);
            document.getElementById('taskInput').focus();
        }

        async function loadTasksFromCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (!response.ok) throw new Error('Помилка мережі');
                const data = await response.json();
                tasks = data.record || [];
                loadingStatus.innerText = ''; 
                renderTasks();
            } catch (error) {
                loadingStatus.innerText = 'Помилка завантаження даних. Перевірте API_KEY.';
                console.error(error);
            }
        }

        async function saveTasksToCloud() {
            loadingStatus.innerText = 'Збереження в хмару...';
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(tasks)
                });
                loadingStatus.innerText = 'Збережено!';
                setTimeout(() => loadingStatus.innerText = '', 2000); 
            } catch (error) {
                loadingStatus.innerText = 'Помилка збереження :(';
                console.error(error);
            }
        }

        function saveAndRender() {
            renderTasks(); 
            saveTasksToCloud(); 
        }

        function renderTasks() {
            document.getElementById('list-do').innerHTML = '';
            document.getElementById('list-plan').innerHTML = '';
            document.getElementById('list-delegate').innerHTML = '';
            document.getElementById('list-eliminate').innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                
                // ТУТ МИ ДОДАЛИ КНОПКУ РЕДАГУВАННЯ (edit-btn)
                li.innerHTML = `
                    <div style="display: flex; flex-direction: column; width: 100%;">
                        <div class="task-content">${task.text}</div>
                        <div class="task-actions">
                            <button class="action-btn" onclick="moveTask(${task.id}, -1)" title="Підняти">▲</button>
                            <button class="action-btn" onclick="moveTask(${task.id}, 1)" title="Опустити">▼</button>
                            <button class="action-btn edit-btn" onclick="editTask(${task.id})" title="Редагувати">✎</button>
                            <button class="delete-btn" onclick="deleteTask(${task.id})" title="Видалити">&times;</button>
                        </div>
                    </div>
                `;

                if (task.urgent && task.important) {
                    document.getElementById('list-do').appendChild(li);
                } else if (!task.urgent && task.important) {
                    document.getElementById('list-plan').appendChild(li);
                } else if (task.urgent && !task.important) {
                    document.getElementById('list-delegate').appendChild(li);
                } else {
                    document.getElementById('list-eliminate').appendChild(li);
                }
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const htmlContent = input.innerHTML;
            const plainText = input.innerText.trim();
            
            // Якщо текст порожній, нічого не додаємо
            if (plainText === '') return;

            const newTask = {
                id: Date.now(),
                text: htmlContent, // Зберігаємо з усім форматуванням
                urgent: document.getElementById('urgentToggle').checked,
                important: document.getElementById('importantToggle').checked
            };

            tasks.push(newTask);
            input.innerHTML = ''; // Очищаємо редактор
            document.getElementById('urgentToggle').checked = false;
            document.getElementById('importantToggle').checked = false;

            saveAndRender();
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(task => task.id !== taskId);
            saveAndRender();
        }

        function moveTask(taskId, direction) {
            const index = tasks.findIndex(t => t.id === taskId);
            if (index === -1) return;

            const currentTask = tasks[index];
            let targetIndex = -1;
            
            if (direction === -1) { 
                for (let i = index - 1; i >= 0; i--) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i; break;
                    }
                }
            } else { 
                for (let i = index + 1; i < tasks.length; i++) {
                    if (tasks[i].urgent === currentTask.urgent && tasks[i].important === currentTask.important) {
                        targetIndex = i; break;
                    }
                }
            }

            if (targetIndex !== -1) {
                const temp = tasks[index];
                tasks[index] = tasks[targetIndex];
                tasks[targetIndex] = temp;
                saveAndRender(); 
            }
        }

        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            // 1. Копіюємо текст завдання в головний редактор знизу
            const editor = document.getElementById('taskInput');
            editor.innerHTML = task.text;
            
            // 2. Встановлюємо перемикачі (Срочно/Важливо)
            document.getElementById('urgentToggle').checked = task.urgent;
            document.getElementById('importantToggle').checked = task.important;

            // 3. Видаляємо старе завдання, щоб після "Додати" воно просто оновилось
            deleteTask(taskId);
            
            // 4. Авто-скрол до редактора, щоб користувач не мотав вгору-вниз
            editor.scrollIntoView({ behavior: 'smooth', block: 'center' });
            editor.focus();
        }

        function saveEditedTask(taskId, contentDiv) {
            const task = tasks.find(t => t.id === taskId);
            // Зберігаємо HTML-контент (з форматуванням)
            task.text = contentDiv.innerHTML;
            
            // Вимикаємо редагування
            contentDiv.contentEditable = false;
            contentDiv.style.border = "none";
            contentDiv.style.padding = "0";
            
            saveAndRender(); // Оновлюємо в хмарі
        }


        function handleKeyPress(event) {
    // Нічого не блокуємо, дозволяємо стандартну поведінку браузера (Enter = перенос рядка)
    // Відправка тепер працюватиме тільки через клік по кнопці "Додати завдання"
    }


        loadTasksFromCloud();
    </script>
</body>
</html>
